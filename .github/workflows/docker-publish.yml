name: Docker Publish

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish"
        required: true
        default: "latest"
      registry:
        description: "Registry to publish to"
        required: true
        default: "both"
        type: choice
        options:
          - ghcr
          - dockerhub
          - both
      platforms:
        description: "Target platforms"
        required: true
        default: "linux/amd64,linux/arm64"
        type: choice
        options:
          - linux/amd64
          - linux/amd64,linux/arm64

concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Resolve publish options
        id: publish_options
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
        run: |
          REGISTRY="${{ github.event.inputs.registry || 'both' }}"
          PLATFORMS="${{ github.event.inputs.platforms || 'linux/amd64,linux/arm64' }}"
          VERSION="${{ github.event.inputs.version }}"

          if [[ -z "$VERSION" || "$VERSION" == "latest" ]]; then
            VERSION="${GITHUB_REF_NAME}"
          fi

          echo "registry=$REGISTRY" >> $GITHUB_OUTPUT
          echo "platforms=$PLATFORMS" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "version_no_v=${VERSION#v}" >> $GITHUB_OUTPUT

          if [[ -n "$DOCKER_USERNAME" && -n "$DOCKER_PASSWORD" ]]; then
            echo "dockerhub_enabled=true" >> $GITHUB_OUTPUT
          else
            echo "dockerhub_enabled=false" >> $GITHUB_OUTPUT
          fi

      - name: Login to GitHub Container Registry
        if: steps.publish_options.outputs.registry == 'ghcr' || steps.publish_options.outputs.registry == 'both' || github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub
        if: (steps.publish_options.outputs.registry == 'dockerhub' || steps.publish_options.outputs.registry == 'both' || github.event_name == 'push') && steps.publish_options.outputs.dockerhub_enabled == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Generate image names
        id: image_names
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "ghcr_image=ghcr.io/$OWNER/cloudimgs" >> $GITHUB_OUTPUT
          echo "dockerhub_image=${{ secrets.DOCKER_USERNAME }}/cloudimgs" >> $GITHUB_OUTPUT
          echo "Debug info:"
          echo "- Event: ${{ github.event_name }}"
          echo "- Ref: ${{ github.ref }}"
          echo "- Tag: ${{ github.ref_name }}"
          echo "- SHA: ${{ github.sha }}"

      - name: Extract metadata for GitHub Packages
        id: meta-ghcr
        if: steps.publish_options.outputs.registry == 'ghcr' || steps.publish_options.outputs.registry == 'both' || github.event_name == 'push'
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image_names.outputs.ghcr_image }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=raw,value=${{ steps.publish_options.outputs.version }},enable=${{ github.event_name == 'workflow_dispatch' && steps.publish_options.outputs.version != 'latest' }}
            type=raw,value=${{ steps.publish_options.outputs.version_no_v }},enable=${{ github.event_name == 'workflow_dispatch' && startsWith(steps.publish_options.outputs.version, 'v') }}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && steps.publish_options.outputs.version != 'latest') }}

      - name: Extract metadata for Docker Hub
        id: meta-dockerhub
        if: (steps.publish_options.outputs.registry == 'dockerhub' || steps.publish_options.outputs.registry == 'both' || github.event_name == 'push') && steps.publish_options.outputs.dockerhub_enabled == 'true'
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image_names.outputs.dockerhub_image }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=raw,value=${{ steps.publish_options.outputs.version }},enable=${{ github.event_name == 'workflow_dispatch' && steps.publish_options.outputs.version != 'latest' }}
            type=raw,value=${{ steps.publish_options.outputs.version_no_v }},enable=${{ github.event_name == 'workflow_dispatch' && startsWith(steps.publish_options.outputs.version, 'v') }}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && steps.publish_options.outputs.version != 'latest') }}

      - name: Build and push to GitHub Packages
        if: steps.publish_options.outputs.registry == 'ghcr' || steps.publish_options.outputs.registry == 'both' || github.event_name == 'push'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.gha
          push: true
          tags: ${{ steps.meta-ghcr.outputs.tags }}
          platforms: ${{ steps.publish_options.outputs.platforms }}
          build-args: |
            NODE_OPTIONS=--max-old-space-size=4096

      - name: Build and push to Docker Hub
        if: (steps.publish_options.outputs.registry == 'dockerhub' || steps.publish_options.outputs.registry == 'both' || github.event_name == 'push') && steps.publish_options.outputs.dockerhub_enabled == 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.gha
          push: true
          tags: ${{ steps.meta-dockerhub.outputs.tags }}
          platforms: ${{ steps.publish_options.outputs.platforms }}
          build-args: |
            NODE_OPTIONS=--max-old-space-size=4096

      - name: Success notification
        run: |
          echo "âś… Docker images published successfully!"
          if [[ "${{ steps.publish_options.outputs.registry }}" == "ghcr" || "${{ steps.publish_options.outputs.registry }}" == "both" || "${{ github.event_name }}" == "push" ]]; then
            echo "GitHub Packages: ${{ steps.image_names.outputs.ghcr_image }}"
            echo "Tags: ${{ steps.meta-ghcr.outputs.tags }}"
            echo "Debug - GitHub Packages tags:"
            echo "${{ steps.meta-ghcr.outputs.tags }}" | tr ',' '\n' | sed 's/^/  /'
          fi
          if [[ "${{ steps.publish_options.outputs.dockerhub_enabled }}" != "true" ]]; then
            echo "Docker Hub skipped because DOCKER_USERNAME or DOCKER_PASSWORD is not configured."
          elif [[ "${{ steps.publish_options.outputs.registry }}" == "dockerhub" || "${{ steps.publish_options.outputs.registry }}" == "both" || "${{ github.event_name }}" == "push" ]]; then
            echo "Docker Hub: ${{ steps.image_names.outputs.dockerhub_image }}"
            echo "Tags: ${{ steps.meta-dockerhub.outputs.tags }}"
            echo "Debug - Docker Hub tags:"
            echo "${{ steps.meta-dockerhub.outputs.tags }}" | tr ',' '\n' | sed 's/^/  /'
          fi
